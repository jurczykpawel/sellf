repos:
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.88.24
    hooks:
      - id: trufflehog
        name: TruffleHog secret scan (incremental, with Sellf custom detectors)
        entry: trufflehog git file://. --since-commit HEAD --config .trufflehog-config.yaml --results=verified,unverified,unknown --fail
        language: golang
        pass_filenames: false
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: lint-admin-panel
        name: ESLint (admin-panel)
        entry: bash -c 'cd admin-panel && bun run lint'
        language: system
        files: ^admin-panel/src/.+\.(ts|tsx)$
        pass_filenames: false
        stages: [pre-commit]

      - id: no-agent-plans
        name: Block agent implementation plans in public repo
        entry: scripts/pre-commit/no-agent-plans.sh
        language: system
        files: ^(.*/)?(docs/superpowers/|docs/plans/).+\.md$
        pass_filenames: true
        stages: [pre-commit]
