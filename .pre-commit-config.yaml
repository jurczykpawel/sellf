repos:
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.88.24
    hooks:
      - id: trufflehog
        name: TruffleHog secret scan
        entry: trufflehog git file://. --since-commit HEAD --results verified,unknown --fail
        language: golang
        pass_filenames: false
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: lint-admin-panel
        name: ESLint (admin-panel)
        entry: bash -c 'cd admin-panel && bun run lint'
        language: system
        files: ^admin-panel/src/.+\.(ts|tsx)$
        pass_filenames: false
        stages: [pre-commit]
