[build]
  base = "admin-panel"
  command = "bun run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[template.environment]
  SUPABASE_URL = "Your Supabase project URL (e.g. https://xxx.supabase.co). See docs/DEPLOYMENT-VERCEL-NETLIFY.md Step 2."
  SUPABASE_ANON_KEY = "Your Supabase anon/public key. See docs/DEPLOYMENT-VERCEL-NETLIFY.md Step 2."
  SUPABASE_SERVICE_ROLE_KEY = "Your Supabase service role key (keep secret). See docs/DEPLOYMENT-VERCEL-NETLIFY.md Step 2."
  STRIPE_SECRET_KEY = "Your Stripe secret key (sk_test_... for testing, sk_live_... for production). See docs/DEPLOYMENT-VERCEL-NETLIFY.md Step 3."
  STRIPE_PUBLISHABLE_KEY = "Your Stripe publishable key (pk_test_... or pk_live_...). See docs/DEPLOYMENT-VERCEL-NETLIFY.md Step 3."
  STRIPE_WEBHOOK_SECRET = "Stripe webhook signing secret (whsec_...). PLACEHOLDER for first deploy — set whsec_REPLACE_AFTER_DEPLOY_xxxxxxxxxxxxxxxxxxxx (>=16 chars). Real value comes from Step 7 after deploy URL exists."
  SITE_URL = "Your site URL (best guess for first deploy, e.g. https://your-site.netlify.app — fix in Step 7 if wrong)."
  CHECKOUT_BINDING_SECRET = "REQUIRED. HMAC secret binding Stripe sessions to (user, product). App refuses to boot without it. Generate locally: openssl rand -base64 32"
  TRUSTED_PROXY = "REQUIRED. Set literally to true. Netlify is a reverse proxy; without this the app refuses to start in production."
  APP_ENCRYPTION_KEY = "REQUIRED. Encrypts Stripe/GUS API keys stored in the admin panel. Generate locally: openssl rand -base64 32"
  LOGINWALL_SECRET = "REQUIRED if you use the login wall content gating snippet. Generate locally: openssl rand -hex 32"
