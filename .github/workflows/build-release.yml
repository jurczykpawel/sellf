name: Build & Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  # Run tests before building
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        working-directory: ./admin-panel
        run: bun install --frozen-lockfile

      - name: Run type check
        working-directory: ./admin-panel
        run: bun run typecheck
        env:
          NODE_ENV: development
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

      - name: Run lint
        working-directory: ./admin-panel
        run: bun run lint

      - name: Dependency audit
        working-directory: ./admin-panel
        continue-on-error: true
        run: |
          # Generate package-lock.json for npm audit (bun has no native audit)
          npm i --package-lock-only --ignore-scripts 2>/dev/null
          npm audit --omit=dev --audit-level=critical

      - name: Scan for leaked secrets
        uses: trufflesecurity/trufflehog@00155c9dc586f34d189adc83d3ac2698c2ec551f # v3.95.8
        with:
          extra_args: --results verified,unknown

  verify-playerstack-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sellf
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install SSH deploy key (read-only to playerstack)
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.PLAYERSTACK_DEPLOY_KEY }}

      - name: Trust github.com host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519,rsa github.com >> ~/.ssh/known_hosts

      - name: Extract pinned playerstack commit SHA from sellf
        id: pin
        shell: bash
        run: |
          set -euo pipefail
          SELLF_SRC_FILE="admin-panel/src/lib/playerstack.ts"
          PS_SHA=$(grep -aoE "PLAYERSTACK_COMMIT_SHA = '[a-f0-9]{40}'" "$SELLF_SRC_FILE" | grep -oE "[a-f0-9]{40}" || true)
          if [[ -z "$PS_SHA" ]]; then
            echo "::error::could not extract PLAYERSTACK_COMMIT_SHA from $SELLF_SRC_FILE" >&2
            exit 1
          fi
          echo "ps_sha=$PS_SHA" >> "$GITHUB_OUTPUT"
          echo "pinned playerstack commit: $PS_SHA"

      - name: Clone playerstack repo at pinned SHA
        run: |
          set -euo pipefail
          git clone --no-checkout git@github.com:jurczykpawel/playerstack.git /tmp/playerstack
          cd /tmp/playerstack
          git checkout --detach ${{ steps.pin.outputs.ps_sha }}
          echo "checked out: $(git rev-parse HEAD)"

      - name: Install playerstack dependencies
        working-directory: /tmp/playerstack
        run: bun install --frozen-lockfile

      - name: Build playerstack embed bundle
        working-directory: /tmp/playerstack/packages/embed
        run: bun run build

      - name: Verify bundle SRI matches sellf source of truth
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_PATH="/tmp/playerstack/packages/embed/dist/playerstack.min.js"
          if [[ ! -s "$BUNDLE_PATH" ]]; then
            echo "::error::playerstack build did not produce $BUNDLE_PATH" >&2
            exit 1
          fi

          UPSTREAM_SRI="sha384-$(openssl dgst -sha384 -binary "$BUNDLE_PATH" | openssl base64 -A)"
          UPSTREAM_SHORT="$(openssl dgst -sha256 "$BUNDLE_PATH" | awk '{print $2}' | cut -c1-12)"

          SELLF_SRC_FILE="admin-panel/src/lib/playerstack.ts"
          SELLF_SRI="$(grep -aoE "sha384-[A-Za-z0-9+/=]+" "$SELLF_SRC_FILE" | head -1 || true)"
          SELLF_BUNDLE_PATH_REL="$(grep -aoE "/vendor/playerstack/playerstack-[a-f0-9]{12}\.min\.js" "$SELLF_SRC_FILE" | head -1 || true)"

          if [[ -z "$SELLF_SRI" || -z "$SELLF_BUNDLE_PATH_REL" ]]; then
            echo "::error::could not extract integrity / bundle path from $SELLF_SRC_FILE" >&2
            exit 1
          fi

          SELLF_BUNDLE_FILE="admin-panel/public${SELLF_BUNDLE_PATH_REL}"
          if [[ ! -s "$SELLF_BUNDLE_FILE" ]]; then
            echo "::error::sellf bundle missing on disk: $SELLF_BUNDLE_FILE" >&2
            exit 1
          fi

          ON_DISK_SRI="sha384-$(openssl dgst -sha384 -binary "$SELLF_BUNDLE_FILE" | openssl base64 -A)"
          if [[ "$ON_DISK_SRI" != "$SELLF_SRI" ]]; then
            echo "::error::bundle in $SELLF_BUNDLE_FILE does not match integrity declared in $SELLF_SRC_FILE" >&2
            echo "::error::on-disk: $ON_DISK_SRI" >&2
            echo "::error::declared: $SELLF_SRI" >&2
            echo "::error::someone modified files in admin-panel/public/vendor/ or playerstack.ts manually" >&2
            exit 1
          fi

          if [[ "$UPSTREAM_SRI" != "$SELLF_SRI" ]]; then
            echo "::warning::upstream rebuild SRI differs from sellf declared — likely esbuild cross-platform non-determinism (mac arm64 vs linux x64)" >&2
            echo "::warning::upstream (rebuilt at ${{ steps.pin.outputs.ps_sha }}): $UPSTREAM_SRI ($UPSTREAM_SHORT)" >&2
            echo "::warning::sellf (declared):   $SELLF_SRI" >&2
            echo "::warning::on-disk SRI matches declared, so manual tampering is still detected; only the cross-platform rebuild check is downgraded to a warning"
          fi

          echo "✓ bundle matches playerstack@${{ steps.pin.outputs.ps_sha }}"
          echo "  bundle: $SELLF_BUNDLE_PATH_REL"
          echo "  sri:    $SELLF_SRI"

  build:
    runs-on: ubuntu-latest
    needs: [test, verify-playerstack-bundle]  # Only build if tests pass AND playerstack bundle is fresh

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "VERSION=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        working-directory: ./admin-panel
        run: bun install --frozen-lockfile

      - name: Build application
        working-directory: ./admin-panel
        run: bun run build
        env:
          NODE_ENV: production
          # Dummy values for build - real values loaded at runtime via /api/runtime-config
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_SITE_URL: https://placeholder.example.com
          NEXT_PUBLIC_BASE_URL: https://placeholder.example.com
          NEXT_PUBLIC_APP_URL: https://placeholder.example.com
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-key
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder

      - name: Package build artifacts
        working-directory: ./admin-panel
        run: |
          # Create release package
          mkdir -p ../release

          # Write version file (used by update.sh for display)
          node -p "require('./package.json').version" > ../release/version.txt

          # Copy built application
          cp -r .next ../release/
          cp package.json ../release/
          cp bun.lock ../release/ 2>/dev/null || true

          # Copy public assets
          cp -r public ../release/ 2>/dev/null || true

          # Copy necessary config files
          cp next.config.ts ../release/ 2>/dev/null || cp next.config.js ../release/ 2>/dev/null || true
          cp tsconfig.json ../release/ 2>/dev/null || true

          # Copy upgrade script
          mkdir -p ../release/scripts
          cp scripts/upgrade.sh ../release/scripts/ 2>/dev/null || true
          chmod +x ../release/scripts/upgrade.sh 2>/dev/null || true

          # Copy Supabase migrations and email templates
          mkdir -p ../release/supabase
          cp -r ../supabase/migrations ../release/supabase/ 2>/dev/null || true
          cp -r ../supabase/templates ../release/supabase/ 2>/dev/null || true

          # Create .env.example for reference
          cat > ../release/.env.example << 'EOF'
          # Sellf Environment Variables
          # Copy this file to .env.local and fill in your values

          # Supabase
          NEXT_PUBLIC_SUPABASE_URL=https://your-project.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=your-anon-key
          SUPABASE_URL=https://your-project.supabase.co
          SUPABASE_ANON_KEY=your-anon-key
          SUPABASE_SERVICE_ROLE_KEY=your-service-role-key

          # Site URLs
          NEXT_PUBLIC_SITE_URL=https://your-domain.com
          NEXT_PUBLIC_BASE_URL=https://your-domain.com
          NEXT_PUBLIC_APP_URL=https://your-domain.com
          SITE_URL=https://your-domain.com

          # Stripe
          STRIPE_PUBLISHABLE_KEY=pk_live_xxx
          STRIPE_SECRET_KEY=sk_live_xxx
          STRIPE_WEBHOOK_SECRET=whsec_xxx

          # Cloudflare Turnstile (optional)
          CLOUDFLARE_TURNSTILE_SITE_KEY=your-site-key
          CLOUDFLARE_TURNSTILE_SECRET_KEY=your-secret-key

          # Production
          NODE_ENV=production
          PORT=3333
          EOF

          # Create startup script
          cat > ../release/start.sh << 'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          # Load .env.local into shell so PM2 captures actual values.
          # dotenv in server.js won't override vars already set by PM2, so we pre-load them here.
          if [ -f .env.local ]; then
            set -o allexport
            source .env.local
            set +o allexport
          fi
          bun run start
          EOF
          chmod +x ../release/start.sh

          # Create tarball
          cd ../release
          tar -czvf ../sellf-build.tar.gz .

      - name: Upload artifact to release
        if: github.event_name == 'release'
        run: gh release upload "${{ steps.version.outputs.VERSION }}" sellf-build.tar.gz --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Sellf ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          files: sellf-build.tar.gz
          body: |
            ## Sellf ${{ steps.version.outputs.VERSION }}

            ### Installation

            ```bash
            # Download and extract
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/sellf-build.tar.gz | tar -xz -C ~/sellf-admin

            # Configure environment
            cd ~/sellf-admin
            cp .env.example .env.local
            nano .env.local  # Fill in your values

            # Install runtime dependencies
            bun install --production

            # Start with PM2
            pm2 start ./start.sh --name sellf-admin
            pm2 save
            ```

            ### What's included
            - Pre-built Next.js application (.next/)
            - Production dependencies (bun.lock)
            - Environment template (.env.example)
            - Startup script (start.sh)
            - Supabase migrations (supabase/migrations/)
            - Email templates (supabase/templates/)

            ### Requirements
            - Bun runtime
            - PM2 (recommended)
            - Configured Supabase project
            - Stripe account (for payments)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build and push Docker image to GHCR
  docker:
    runs-on: ubuntu-latest
    needs: [test, verify-playerstack-bundle]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "VERSION=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/sellf
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.VERSION }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.VERSION }}
            type=raw,value=latest

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
