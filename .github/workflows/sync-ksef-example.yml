name: Sync KSeF n8n example

# n8n/sellf-ksef*.json is a MIRROR — source of truth lives in
# jurczykpawel/ksef-gateway (examples/n8n/). Edit it THERE; this job
# copies changes here so the example ships in both repos.
on:
  schedule:
    - cron: '17 6 * * 1' # weekly, Monday morning
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Fetch from ksef-gateway
        run: |
          base="https://raw.githubusercontent.com/jurczykpawel/ksef-gateway/main/examples/n8n"
          for f in sellf-ksef.json sellf-ksef-PL.json; do
            curl -fsSL "$base/$f" -o "n8n/$f"
          done

      - name: Commit if changed
        run: |
          if git diff --quiet -- n8n/; then
            echo "Already in sync."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add n8n/sellf-ksef.json n8n/sellf-ksef-PL.json
          git commit -m "chore(n8n): sync Sellf→KSeF example from ksef-gateway"
          git push
