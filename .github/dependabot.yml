version: 2

updates:
  # admin-panel is built with Bun (CI: `bun install --frozen-lockfile`), so
  # Dependabot must track bun.lock — the lockfile that actually ships. Tracking
  # the npm ecosystem here updated a package-lock.json the build never used, so
  # fixes never reached the artifact and alerts lingered. NOTE: Dependabot does
  # not raise *security* PRs for Bun, only version PRs; the weekly minor+patch
  # group carries most security patches, the rest via manual `bun update`.
  - package-ecosystem: "bun"
    directory: "/admin-panel"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/mcp-server"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "ci"
